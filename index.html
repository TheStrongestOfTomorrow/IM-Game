<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronMan: Sandbox Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .hud-panel {
            position: absolute;
            background: rgba(10, 20, 40, 0.85);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }

        #armor-selector {
            top: 20px;
            left: 20px;
            width: 250px;
        }

        #stats-panel {
            top: 20px;
            right: 20px;
            width: 200px;
        }

        #controls-help {
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            opacity: 0.8;
        }

        h3 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .armor-btn {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border: 1px solid #ffd700;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .armor-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .armor-btn.active {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #000;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }

        .stat-value {
            color: #ffd700;
            font-weight: bold;
        }

        #energy-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        #energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffd700);
            width: 100%;
            transition: width 0.3s;
        }

        #action-buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            pointer-events: auto;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            margin: 5px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border: 2px solid #ffd700;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .arc-reactor {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, #00ffff 0%, #0088ff 50%, transparent 70%);
            box-shadow: 0 0 50px #00ffff, 0 0 100px #0088ff;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .loading-text {
            color: #ffd700;
            margin-top: 30px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        #title-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f1a 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        #title-screen.hidden {
            display: none;
        }

        .game-title {
            font-size: 72px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 15px;
            text-shadow: 0 0 30px #ffd700, 0 0 60px #ff8c00;
            margin-bottom: 20px;
        }

        .game-subtitle {
            font-size: 24px;
            color: #00ffff;
            letter-spacing: 8px;
            margin-bottom: 50px;
        }

        .start-btn {
            padding: 20px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border: 3px solid #ffd700;
            color: white;
            cursor: pointer;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: all 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
        }
    </style>
</head>
<body>
    <div id="title-screen">
        <h1 class="game-title">IRONMAN</h1>
        <p class="game-subtitle">SANDBOX EXPERIENCE</p>
        <button class="start-btn" onclick="startGame()">ENTER SUIT</button>
    </div>

    <div id="loading-screen" class="hidden">
        <div class="arc-reactor"></div>
        <p class="loading-text">Initializing Arc Reactor...</p>
    </div>

    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div id="ui-overlay">
            <div id="armor-selector" class="hud-panel">
                <h3>Armor Select</h3>
                <button class="armor-btn active" data-armor="mark3">Mark III</button>
                <button class="armor-btn" data-armor="mark42">Mark XLII</button>
                <button class="armor-btn" data-armor="hulkbuster">Hulkbuster</button>
                <button class="armor-btn" data-armor="bleeding">Bleeding Edge</button>
                <button class="armor-btn" data-armor="stealth">Stealth Suit</button>
            </div>

            <div id="stats-panel" class="hud-panel">
                <h3>Suit Status</h3>
                <div class="stat-row">
                    <span>Speed:</span>
                    <span class="stat-value" id="speed-stat">85%</span>
                </div>
                <div class="stat-row">
                    <span>Power:</span>
                    <span class="stat-value" id="power-stat">95%</span>
                </div>
                <div class="stat-row">
                    <span>Defense:</span>
                    <span class="stat-value" id="defense-stat">90%</span>
                </div>
                <p style="margin-top: 15px;">Energy:</p>
                <div id="energy-bar">
                    <div id="energy-fill"></div>
                </div>
            </div>

            <div id="controls-help" class="hud-panel">
                <h3>Controls</h3>
                <p>WASD / Arrows - Move</p>
                <p>SPACE - Fly Up</p>
                <p>SHIFT - Fly Down</p>
                <p>CLICK - Repulsor Blast</p>
                <p>E - Unibeam</p>
                <p>R - Reset Position</p>
            </div>

            <div id="action-buttons">
                <button class="action-btn" onclick="fireRepulsor()" title="Repulsor">⚡</button>
                <button class="action-btn" onclick="fireUnibeam()" title="Unibeam">💥</button>
                <button class="action-btn" onclick="boost()" title="Boost">🚀</button>
            </div>
        </div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="game.js"></script>
</body>
</html>
