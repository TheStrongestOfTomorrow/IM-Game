name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages branch
        env:
          PAT_SECRET: ${{ secrets.PAT_SECRET }}
        run: |
          # Clone the repo to a temp directory with gh-pages branch
          git clone --depth=1 --branch=gh-pages \
            https://x-access-token:${PAT_SECRET}@github.com/${{ github.repository }}.git gh-pages-build 2>/dev/null || \
          git clone --depth=1 https://x-access-token:${PAT_SECRET}@github.com/${{ github.repository }}.git gh-pages-build

          cd gh-pages-build

          # Copy all game files
          cp -r ../index.html ../game.js ../README.md ./ 2>/dev/null || true

          # Add, commit and push
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Deploy game from commit ${{ github.sha }}"
            git push origin gh-pages
          else
            echo "No changes to deploy"
          fi
